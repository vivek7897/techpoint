<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Techknowldge Register</title>
    <link rel="stylesheet" href="/frontend/src/assets/css/register.css" />
  </head>

  <body>
    <div class="login-container">
      <!-- Logo -->
      <a href="/frontend/public/index.html"
        ><img
          src="/frontend/src/assets/images/logo.png"
          class="logo"
          alt="Techknowldge Logo"
      /></a>
      <h2>Create Your Account</h2>
      <form>
        <div class="input-group">
          <label>Full Name</label
          ><input type="text" placeholder="Enter your full name" required />
        </div>
        <div class="input-group">
          <label>Email</label
          ><input type="email" placeholder="Enter your email" required />
        </div>
        <div class="input-group">
          <label>Password</label
          ><input type="password" placeholder="Create password" required />
        </div>
        <div class="input-group">
          <label>Confirm Password</label
          ><input type="password" placeholder="Confirm password" required />
        </div>
        <button type="submit" class="login-btn">Register</button>
      </form>
      <p class="signup">
        Already have an account?
        <a href="/frontend/src/pages/auth/login.html">Login</a>
      </p>
    </div>
  </body>
</html>
