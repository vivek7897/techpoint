<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - CodeSeekho</title>
    <link rel="stylesheet" href="/frontend/src/assets/css/forgot.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>

  <body>
    <div class="login-container">
      <a href="/frontend/public/index.html">
        <img
          src="/frontend/src/assets/images/logo.png"
          class="logo"
          alt=" Logo"
        />
      </a>

      <h2>Forgot Password</h2>

      <!-- EMAIL STEP -->
      <div id="emailStep">
        <div class="input-group">
          <label>Email Address</label>
          <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required
          />
        </div>
        <button class="login-btn" onclick="sendOTP()">Send OTP</button>
      </div>

      <!-- OTP STEP -->
      <div id="otpStep" style="display: none">
        <div class="input-group">
          <label>Enter OTP</label>
          <input
            type="text"
            id="otp"
            placeholder="Enter 6-digit OTP"
            maxlength="6"
            required
          />
        </div>
        <button class="login-btn" onclick="verifyOTP()">Verify OTP</button>
      </div>

      <!-- RESET PASSWORD -->
      <div id="resetStep" style="display: none">
        <div class="input-group">
          <label>New Password</label>
          <div class="password-field">
            <input
              type="password"
              id="newPassword"
              placeholder="Enter new password"
              required
            />
            <i
              class="fas fa-eye-slash toggle"
              onclick="togglePassword('newPassword', this)"
            ></i>
          </div>
        </div>
        <div class="input-group">
          <label>Confirm Password</label>
          <div class="password-field">
            <input
              type="password"
              id="confirmPassword"
              placeholder="Confirm new password"
              required
            />
            <i
              class="fas fa-eye-slash toggle"
              onclick="togglePassword('confirmPassword', this)"
            ></i>
          </div>
        </div>
        <button class="login-btn" onclick="resetPassword()">
          Reset Password
        </button>
      </div>

      <p class="signup">
        Remember your password? <a href="/frontend/src/pages/auth/login.html">Login</a>
      </p>
    </div>

    <script src="/frontend/src/assets/js/forgot.js"></script>
  </body>
</html>
